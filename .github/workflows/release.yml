name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Build .deb
        run: ./build-deb.sh "${{ steps.version.outputs.version }}"

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
        env:
          GNUPGHOME: /home/runner/.gnupg

      - name: Update signed APT repo
        env:
          GNUPGHOME: /home/runner/.gnupg
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_TTY: /dev/tty
        run: |
          # allow non-interactive signing with a passphrase-protected key
          echo "allow-loopback-pinentry" >> "$GNUPGHOME/gpg-agent.conf"
          gpgconf --reload gpg-agent
          export GPG_OPTS="--pinentry-mode loopback --passphrase ${{ secrets.GPG_PASSPHRASE }}"
          ./scripts/update-apt-repo.sh "omnihear_${{ steps.version.outputs.version }}_amd64.deb"

      - name: Commit and push updated repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs/
          git commit -m "Publish omnihear ${{ steps.version.outputs.version }}"
          git push

      - name: Attach .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: omnihear_${{ steps.version.outputs.version }}_amd64.deb

      - name: Clean up signing key
        if: always()
        run: gpgconf --kill gpg-agent && rm -rf /home/runner/.gnupg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=$($env:GITHUB_REF_NAME.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install pyinstaller -r src/requirements-win.txt

      - name: Build with PyInstaller
        run: pyinstaller --noconsole --onedir --name omnihear --paths src --icon windows/omnihear.ico --add-data "windows/omnihear.ico;." --collect-all faster_whisper --collect-all ctranslate2 windows/entry.py

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVersion=${{ steps.version.outputs.version }} windows\omnihear.iss

      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installer/omnihear-setup-${{ steps.version.outputs.version }}.exe
