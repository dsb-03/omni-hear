name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Build .deb
        run: ./build-deb.sh "${{ steps.version.outputs.version }}"

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
        env:
          GNUPGHOME: /home/runner/.gnupg

      - name: Update signed APT repo
        env:
          GNUPGHOME: /home/runner/.gnupg
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_TTY: /dev/tty
        run: |
          # allow non-interactive signing with a passphrase-protected key
          echo "allow-loopback-pinentry" >> "$GNUPGHOME/gpg-agent.conf"
          gpgconf --reload gpg-agent
          export GPG_OPTS="--pinentry-mode loopback --passphrase ${{ secrets.GPG_PASSPHRASE }}"
          ./scripts/update-apt-repo.sh "omnihear_${{ steps.version.outputs.version }}_amd64.deb"

      - name: Commit and push updated repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs/
          git commit -m "Publish omnihear ${{ steps.version.outputs.version }}"
          git push

      - name: Attach .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: omnihear_${{ steps.version.outputs.version }}_amd64.deb

      - name: Clean up signing key
        if: always()
        run: gpgconf --kill gpg-agent && rm -rf /home/runner/.gnupg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=$($env:GITHUB_REF_NAME.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install pyinstaller -r src/requirements-win.txt

      - name: Build with PyInstaller
        run: pyinstaller --noconsole --onedir --name omnihear --paths src --icon windows/omnihear.ico --add-data "windows/omnihear.ico;." --collect-all faster_whisper --collect-all ctranslate2 windows/entry.py

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVersion=${{ steps.version.outputs.version }} windows\omnihear.iss

      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installer/omnihear-setup-${{ steps.version.outputs.version }}.exe

  build-macos:
    runs-on: macos-14   # Apple Silicon runner -> arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install pyinstaller -r src/requirements-mac.txt

      - name: Build .icns
        run: bash macos/make-icns.sh

      - name: Build omnihear.app with PyInstaller
        env:
          OMNIHEAR_VERSION: ${{ steps.version.outputs.version }}
        run: pyinstaller macos/omnihear.spec

      - name: Sign the app (skipped without signing secrets)
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash macos/sign.sh app

      - name: Build DMG
        run: bash macos/build-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Notarize + staple the DMG (skipped without signing secrets)
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash macos/sign.sh dmg "omnihear-${{ steps.version.outputs.version }}-arm64.dmg"

      - name: Attach DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: omnihear-${{ steps.version.outputs.version }}-arm64.dmg

      - name: Update Homebrew Cask tap (skipped without tap token)
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          # owner/name of the tap repo, e.g. "your-user/homebrew-omnihear"
          TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set -- skipping cask update."
            exit 0
          fi
          bash macos/update-cask.sh
